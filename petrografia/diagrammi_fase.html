<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Diagrammi di Fase - Fusi Silicatici</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--panel:#111318;--border:#1e2230;
  --accent:#00d4ff;--accent2:#ff6b35;--accent3:#a8ff78;
  --text:#ffffff;--muted:#c8ccd8;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow:hidden;display:flex;flex-direction:column}
header{flex-shrink:0;padding:.4rem 1.2rem;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0d1018 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap}
header h1{font-family:'Crimson Pro',serif;font-weight:300;font-style:italic;font-size:1.2rem;color:var(--accent)}
.tabs{display:flex;gap:.2rem;flex-wrap:wrap}
.tab{padding:.22rem .6rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:.6rem;cursor:pointer;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;transition:all .15s}
.tab.on,.tab:hover{border-color:var(--accent);color:var(--accent)}
.main{display:flex;flex:1;min-height:0}
.sb{width:215px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);padding:.7rem;display:flex;flex-direction:column;gap:.6rem;overflow-y:auto}
.sl{font-size:.52rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:.15rem;font-family:'Space Mono',monospace}
.cr{display:flex;flex-direction:column;gap:.1rem}
.ch{display:flex;justify-content:space-between;font-size:.62rem;color:var(--muted)}
.cv{color:var(--accent);font-size:.65rem}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;margin-top:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px var(--accent)}
.btn{width:100%;padding:.28rem .5rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:.6rem;cursor:pointer;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.info{background:#070910;border:1px solid var(--border);border-radius:4px;padding:.4rem;font-size:.62rem;line-height:1.7;color:var(--muted);font-family:'Crimson Pro',serif;font-style:italic}
.info b{color:var(--text);font-style:normal}
.cw{flex:1;min-width:0}
canvas{width:100%;height:100%;display:block;background:#07090e}
.ibar{flex-shrink:0;border-top:1px solid var(--border);padding:.25rem 1.2rem;background:var(--panel);display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.6rem;color:var(--muted)}
.ibar span{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>Diagrammi di Fase &mdash; Fusi Silicatici Binari</h1>
  <div class="tabs">
    <button class="tab on" data-s="0">I. Ab-An</button>
    <button class="tab" data-s="1">II. Di-An</button>
    <button class="tab" data-s="2">III. Lc-SiO2</button>
    <button class="tab" data-s="3">IV. Ab-Or</button>
  </div>
</header>
<div class="main">
<aside class="sb">
  <div><div class="sl">Descrizione</div><div class="info" id="desc">-</div></div>
  <div><div class="sl">Composizione % B</div>
    <div class="cr"><div class="ch">cx <span class="cv" id="xv">50%</span></div>
    <input type="range" id="xs" min="2" max="98" step="1" value="50"></div>
  </div>
  <div>
    <div style="display:flex;gap:.3rem;margin-bottom:.3rem">
      <button class="btn" id="btnP">&#9654; Raffredda</button>
      <button class="btn" id="btnR" style="width:auto;padding:.3rem .5rem">&#8635;</button>
    </div>
    <div class="cr"><div class="ch">Velocita <span class="cv" id="spv">1x</span></div>
    <input type="range" id="sps" min="0.5" max="3" step="0.5" value="1"></div>
  </div>
  <div><div class="sl">T corrente</div>
    <div style="font-size:.75rem;font-family:'JetBrains Mono',monospace;color:#8b3a0a;padding:.3rem 0" id="tv">-</div>
  </div>
  <div><div class="sl">Fase</div><div class="info" id="ph">-</div></div>
  <div><div class="sl">Legenda</div>
    <div style="font-size:.62rem;line-height:2;color:#8a7a6a">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ef5350;border:2px solid #111;vertical-align:middle"></span> Rosso: composizione liquido<br>
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#42a5f5;border:2px solid #111;vertical-align:middle"></span> Blu: composizione solido<br>
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#66bb6a;border:2px solid #111;vertical-align:middle"></span> Verde: temperatura corrente
    </div>
  </div>
</aside>
<div class="cw"><canvas id="c"></canvas></div>
</div>
<div class="ibar">
  <div>T: <span id="iT">-</span></div>
  <div>Rosso: <span id="iR">-</span></div>
  <div>Blu: <span id="iB">-</span></div>
  <div>Fase: <span id="iP">-</span></div>
</div>
<script>
// =====================================================================
// UTILITA COMUNI
// =====================================================================
function bisD(f,lo,hi){for(let i=0;i<80;i++){const m=(lo+hi)/2;if(f(m)>0)lo=m;else hi=m;}return(lo+hi)/2;}
function bisC(f,lo,hi){for(let i=0;i<80;i++){const m=(lo+hi)/2;if(f(m)<0)lo=m;else hi=m;}return(lo+hi)/2;}

// Tabelle Ab-An
const ABAL=[1118,1149.6,1173.2,1192.4,1208.7,1222.9,1235.7,1247.2,1257.7,1267.4,1276.5,1284.9,1292.9,1300.4,1307.5,1314.3,1320.8,1327,1332.9,1338.6,1344.1,1349.4,1354.5,1359.4,1364.2,1368.8,1373.3,1377.7,1381.9,1386,1390.1,1394,1397.8,1401.6,1405.2,1408.8,1412.3,1415.7,1419,1422.3,1425.5,1428.7,1431.8,1434.8,1437.8,1440.7,1443.6,1446.4,1449.2,1451.9,1454.6,1457.2,1459.8,1462.4,1464.9,1467.4,1469.8,1472.2,1474.6,1477,1479.3,1481.6,1483.8,1486,1488.2,1490.4,1492.5,1494.7,1496.8,1498.8,1500.9,1502.9,1504.9,1506.8,1508.8,1510.7,1512.6,1514.5,1516.4,1518.2,1520,1521.8,1523.6,1525.4,1527.1,1528.9,1530.6,1532.3,1534,1535.6,1537.3,1538.9,1540.5,1542.1,1543.7,1545.3,1546.9,1548.4,1550,1551.5,1553];
const ABAS=[1118,1120.4,1122.8,1125.2,1127.7,1130.1,1132.6,1135.2,1137.8,1140.4,1143,1145.7,1148.4,1151.1,1153.9,1156.7,1159.5,1162.4,1165.3,1168.2,1171.2,1174.2,1177.3,1180.4,1183.5,1186.7,1189.9,1193.2,1196.5,1199.8,1203.2,1206.7,1210.1,1213.7,1217.3,1220.9,1224.5,1228.3,1232,1235.9,1239.7,1243.6,1247.6,1251.6,1255.7,1259.8,1264,1268.3,1272.6,1276.9,1281.3,1285.8,1290.3,1294.9,1299.5,1304.2,1308.9,1313.7,1318.5,1323.4,1328.4,1333.4,1338.5,1343.6,1348.8,1354,1359.2,1364.5,1369.9,1375.3,1380.8,1386.2,1391.8,1397.3,1403,1408.6,1414.3,1420,1425.7,1431.4,1437.2,1443,1448.8,1454.6,1460.5,1466.3,1472.1,1478,1483.8,1489.7,1495.5,1501.4,1507.2,1513,1518.8,1524.5,1530.3,1536,1541.7,1547.4,1553];
function tabGet(tab,x){const N=tab.length-1,i=Math.max(0,Math.min(N-1,Math.floor(x*N))),f=x*N-i;return tab[i]*(1-f)+tab[i+1]*f;}
function tabInv(tab,T){let lo=0,hi=1;for(let i=0;i<80;i++){const m=(lo+hi)/2;if(tabGet(tab,m)<T)lo=m;else hi=m;}return(lo+hi)/2;}

// =====================================================================
// SISTEMI: ciascuno e' un oggetto autonomo
// =====================================================================
const SYSTEMS = [

// ------------------------------------------------------------------
// 0: Ab-An soluzione solida
// ------------------------------------------------------------------
{
  name:'Albite - Anortite', compA:'Ab', compB:'An',
  desc:'<b>Soluzione solida completa.</b> Liquidus molto curvo, solidus quasi lineare. Il solido e sempre piu ricco in An rispetto al liquido coesistente.',
  TVIS:[1100,1600], TSTART:1610,
  PAUSE:120, N:600, NCOOL:300,

  liq(x){return tabGet(ABAL,x);},
  sol(x){return tabGet(ABAS,x);},
  xLiqAtT(T){return tabInv(ABAL,T);},
  xSolAtT(T){return tabInv(ABAS,T);},

  buildPath(cx){
    const s=this, path=[];
    const Tliq=s.liq(cx), Tsol=s.sol(cx);
    const N0=Math.max(200,Math.round((s.TSTART-Tliq)/0.3));
    for(let i=0;i<=N0;i++){
      const T=s.TSTART-(s.TSTART-Tliq)*i/N0;
      path.push({T,xR:null,tR:null,xB:null,tB:null,xB2:null,tB2:null,phase:'Liquido'});
    }
    for(let i=1;i<=s.N;i++){
      const T=Tliq-(Tliq-Tsol)*i/s.N;
      if(T<=Tsol) break;
      const xR=s.xLiqAtT(T), xB=s.xSolAtT(T);
      path.push({T,xR,tR:s.liq(xR),xB,tB:s.sol(xB),xB2:null,tB2:null,phase:'L + Plagioclasio'});
    }
    for(let i=0;i<=s.NCOOL;i++){
      const T=Tsol-i*2; if(T<s.TVIS[0]-5)break;
      path.push({T,xR:null,tR:null,xB:cx,tB:Tsol,xB2:null,tB2:null,phase:'Solido'});
    }
    return path;
  },

  phaseExtra(fr,cx){
    if(fr.phase==='Solido'){
      const pAn=(cx*100).toFixed(0), pAb=(100-cx*100).toFixed(0);
      return '<br><span style="font-size:.6rem;color:#c8ccd8">Composizione finale:<br>'+pAb+'% Ab + '+pAn+'% An</span>';
    }
    return '';
  },

  T2y(T,m){return m.T+m.H*(1-(T-this.TVIS[0])/(this.TVIS[1]-this.TVIS[0]));},
  T2yValid(T){return T>=this.TVIS[0]&&T<=this.TVIS[1];},

  drawExtra(ctx,m,cx){
    // Nessun extra specifico
  },

  drawSolidus(ctx,m){
    // crv generica disegna il solidus
  }
},

// ------------------------------------------------------------------
// 1: Di-An eutettico
// ------------------------------------------------------------------
{
  name:'Diopside - Anortite', compA:'Di', compB:'An',
  desc:'<b>Eutettico semplice.</b> Di e An non sono miscibili allo stato solido. Eutettico E a 42% An, 1274C. A sx cristallizza Di puro; a dx An puro.',
  TVIS:[1200,1650], TSTART:1660,
  PAUSE:120, N:600, NCOOL:300,
  XE:0.42, TE:1274,

  liq(x){const xe=0.42,Te=1274,Ta=1392,Tb=1553;return x<=xe?Te+(Ta-Te)*Math.pow((xe-x)/xe,0.82):Te+(Tb-Te)*Math.pow((x-xe)/(1-xe),0.82);},
  sol(x){return 1274;},

  buildPath(cx){
    const s=this, path=[], xe=s.XE, Te=s.TE;
    const Tliq=s.liq(cx);
    const N0=Math.max(200,Math.round((s.TSTART-Tliq)/0.3));
    for(let i=0;i<=N0;i++){
      const T=s.TSTART-(s.TSTART-Tliq)*i/N0;
      path.push({T,xR:null,tR:null,xB:null,tB:null,xB2:null,tB2:null,phase:'Liquido'});
    }
    if(Math.abs(cx-xe)<0.01){
      for(let i=0;i<s.PAUSE;i++) path.push({T:Te,xR:xe,tR:Te,xB:0,tB:Te,xB2:1,tB2:Te,phase:'Eutettico'});
      for(let i=1;i<=s.NCOOL;i++){const T=Te-i*2;if(T<s.TVIS[0]-5)break;path.push({T,xR:null,tR:null,xB:0,tB:Te,xB2:1,tB2:Te,phase:'Solido (Di+An)'});}
    } else if(cx<xe){
      for(let i=1;i<=s.N;i++){
        const T=Tliq-(Tliq-Te)*i/s.N; if(T<=Te)break;
        const xR=bisD(v=>s.liq(v)-T,0,xe);
        path.push({T,xR,tR:s.liq(xR),xB:0,tB:T,xB2:null,tB2:null,phase:'L + Di'});
      }
      for(let i=0;i<s.PAUSE;i++) path.push({T:Te,xR:xe,tR:Te,xB:0,tB:Te,xB2:1,tB2:Te,phase:'Eutettico'});
      for(let i=1;i<=s.NCOOL;i++){const T=Te-i*2;if(T<s.TVIS[0]-5)break;path.push({T,xR:null,tR:null,xB:0,tB:Te,xB2:1,tB2:Te,phase:'Solido (Di+An)'});}
    } else {
      for(let i=1;i<=s.N;i++){
        const T=Tliq-(Tliq-Te)*i/s.N; if(T<=Te)break;
        const xR=bisC(v=>s.liq(v)-T,xe,1);
        path.push({T,xR,tR:s.liq(xR),xB:1,tB:T,xB2:null,tB2:null,phase:'L + An'});
      }
      for(let i=0;i<s.PAUSE;i++) path.push({T:Te,xR:xe,tR:Te,xB:1,tB:Te,xB2:0,tB2:Te,phase:'Eutettico'});
      for(let i=1;i<=s.NCOOL;i++){const T=Te-i*2;if(T<s.TVIS[0]-5)break;path.push({T,xR:null,tR:null,xB:1,tB:Te,xB2:0,tB2:Te,phase:'Solido (Di+An)'});}
    }
    return path;
  },

  phaseExtra(fr,cx){
    if(fr.phase==='Solido (Di+An)'){
      const pAn=(cx*100).toFixed(0), pDi=(100-cx*100).toFixed(0);
      return '<br><span style="font-size:.6rem;color:#c8ccd8">Composizione finale:<br>'+pDi+'% Di + '+pAn+'% An</span>';
    }
    return '';
  },

  T2y(T,m){return m.T+m.H*(1-(T-this.TVIS[0])/(this.TVIS[1]-this.TVIS[0]));},
  T2yValid(T){return T>=this.TVIS[0]&&T<=this.TVIS[1];},

  drawExtra(ctx,m,cx){
    // Solidus orizzontale a Te
    const yTe=this.T2y(this.TE,m);
    ctx.strokeStyle='#2980b9';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(m.L,yTe);ctx.lineTo(m.L+m.W,yTe);ctx.stroke();
    // Punto eutettico
    ctx.beginPath();ctx.arc(m.L+this.XE*m.W,yTe,5,0,2*Math.PI);ctx.fillStyle='#00d4ff';ctx.fill();
    ctx.font='italic 9px Crimson Pro';ctx.fillStyle='#c8ccd8';ctx.textAlign='left';
    ctx.fillText('E '+this.TE,m.L+this.XE*m.W+7,yTe-3);
  }
},

// ------------------------------------------------------------------
// 2: Lc-SiO2 peritettico
// ------------------------------------------------------------------
{
  name:'Leucite - SiO2', compA:'Lc', compB:'SiO2',
  desc:'<b>Peritettico + eutettico.</b> Sanidino (Sa) e il composto intermedio. Peritettico P (40% SiO2, 1557C). Eutettico E (66% SiO2, 1080C).',
  TVIS:[980,1800], TSTART:1810,
  PAUSE:120, N1:200, N2:300, N3:200, NCOOL:80,
  XP:0.40, TP:1557, XE:0.66, TE:1080, CX_SOGLIA:0.178,

  liq(x){
    const xp=0.40,Tp=1557,xe=0.66,Te=1080,Ta=1686,Tb=1713;
    if(x<xp)return Tp+(Ta-Tp)*Math.pow((xp-x)/xp,0.72);
    if(x<=xe)return Te+(Tp-Te)*Math.pow((xe-x)/(xe-xp),0.88);
    return Te+(Tb-Te)*Math.pow((x-xe)/(1-xe),0.78);
  },
  sol(x){return x<=0.40?1557:1080;},

  buildPath(cx){
    const s=this,path=[];
    const XP=s.XP,TP=s.TP,XE=s.XE,TE=s.TE,CX_SOGLIA=s.CX_SOGLIA;
    const Tliq=s.liq(cx);
    const N0=200;
    for(let i=0;i<=N0;i++){
      const T=s.TSTART-(s.TSTART-Tliq)*i/N0;
      path.push({T,xRed:null,xBlue:null,xBlue2:null,tRed:null,tBlue:null,tBlue2:null,phase:'Liquido'});
    }
    if(cx<XP){
      for(let i=1;i<=s.N1;i++){
        const T=Tliq-(Tliq-TP)*i/s.N1; if(T<=TP)break;
        const xRed=bisD(v=>s.liq(v)-T,0,XP);
        path.push({T,xRed,xBlue:0,xBlue2:null,tRed:s.liq(xRed),tBlue:T,tBlue2:null,phase:'L + Lc'});
      }
      for(let i=0;i<s.PAUSE;i++)
        path.push({T:TP,xRed:XP,xBlue:XP,xBlue2:null,tRed:TP,tBlue:TP,tBlue2:null,phase:'Reazione peritettica'});
      if(cx<=CX_SOGLIA){
        const Nsolid=Math.ceil((TP-s.TVIS[0])/1.5);
        for(let i=1;i<=Nsolid;i++){const T=TP-i*1.5;if(T<s.TVIS[0])break;path.push({T,xRed:null,xBlue:XP,xBlue2:0,tRed:null,tBlue:TP,tBlue2:TP,phase:'Solido (Sa + Lc)'});}
      } else {
        for(let i=1;i<=s.N2;i++){
          const T=TP-(TP-TE)*i/s.N2; if(T<=TE)break;
          const xRed=bisD(v=>s.liq(v)-T,XP,XE);
          path.push({T,xRed,xBlue:XP,xBlue2:null,tRed:s.liq(xRed),tBlue:T,tBlue2:null,phase:'L + Sa'});
        }
        for(let i=0;i<s.PAUSE;i++) path.push({T:TE,xRed:XE,xBlue:XP,xBlue2:1,tRed:TE,tBlue:TE,tBlue2:TE,phase:'Eutettico'});
        for(let i=1;i<=s.NCOOL;i++){const T=TE-i*1.5;if(T<s.TVIS[0])break;path.push({T,xRed:null,xBlue:XP,xBlue2:1,tRed:null,tBlue:TE,tBlue2:TE,phase:'Solido (Sa + SiO2)'});}
      }
    } else if(cx<=XE){
      for(let i=1;i<=s.N2;i++){
        const T=Tliq-(Tliq-TE)*i/s.N2; if(T<=TE)break;
        const xRed=bisD(v=>s.liq(v)-T,XP,XE);
        path.push({T,xRed,xBlue:XP,xBlue2:null,tRed:s.liq(xRed),tBlue:T,tBlue2:null,phase:'L + Sa'});
      }
      for(let i=0;i<s.PAUSE;i++) path.push({T:TE,xRed:XE,xBlue:XP,xBlue2:1,tRed:TE,tBlue:TE,tBlue2:TE,phase:'Eutettico'});
      for(let i=1;i<=s.NCOOL;i++){const T=TE-i*1.5;if(T<s.TVIS[0])break;path.push({T,xRed:null,xBlue:XP,xBlue2:1,tRed:null,tBlue:TE,tBlue2:TE,phase:'Solido (Sa + SiO2)'});}
    } else {
      function bisC2(f,lo,hi){for(let i=0;i<80;i++){const m2=(lo+hi)/2;if(f(m2)<0)lo=m2;else hi=m2;}return(lo+hi)/2;}
      for(let i=1;i<=s.N3;i++){
        const T=Tliq-(Tliq-TE)*i/s.N3; if(T<=TE)break;
        const xRed=bisC2(v=>s.liq(v)-T,XE,1);
        path.push({T,xRed,xBlue:1,xBlue2:null,tRed:s.liq(xRed),tBlue:T,tBlue2:null,phase:'L + SiO2'});
      }
      for(let i=0;i<s.PAUSE;i++) path.push({T:TE,xRed:XE,xBlue:1,xBlue2:XP,tRed:TE,tBlue:TE,tBlue2:TE,phase:'Eutettico'});
      for(let i=1;i<=s.NCOOL;i++){const T=TE-i*1.5;if(T<s.TVIS[0])break;path.push({T,xRed:null,xBlue:1,xBlue2:XP,tRed:null,tBlue:TE,tBlue2:TE,phase:'Solido (Sa + SiO2)'});}
    }
    return path;
  },

  // Lc-SiO2 usa xRed/xBlue invece di xR/xB (compatibilita col file originale)
  // Normalizziamo nel draw principale
  normalizeFrame(fr){
    return {
      T:fr.T,
      xR:fr.xRed!==undefined?fr.xRed:fr.xR,
      tR:fr.tRed!==undefined?fr.tRed:fr.tR,
      xB:fr.xBlue!==undefined?fr.xBlue:fr.xB,
      tB:fr.tBlue!==undefined?fr.tBlue:fr.tB,
      xB2:fr.xBlue2!==undefined?fr.xBlue2:fr.xB2,
      tB2:fr.tBlue2!==undefined?fr.tBlue2:fr.tB2,
      phase:fr.phase
    };
  },

  phaseExtra(fr,cx){
    const XP=this.XP;
    const phase=fr.xRed!==undefined?fr.phase:(fr.phase||'');
    if(phase==='Solido (Sa + Lc)'){
      const fSa=Math.round(cx/XP*100), fLc=100-fSa;
      return '<br><span style="font-size:.6rem;color:#c8ccd8">Composizione finale:<br>'+fLc+'% Lc + '+fSa+'% Sa</span>';
    } else if(phase==='Solido (Sa + SiO2)'){
      if(cx>=XP){
        const fSiO2=Math.round((cx-XP)/(1-XP)*100), fSa=100-fSiO2;
        return '<br><span style="font-size:.6rem;color:#c8ccd8">Composizione finale:<br>'+fSa+'% Sa + '+fSiO2+'% SiO\u2082</span>';
      }
      return '<br><span style="font-size:.6rem;color:#c8ccd8">Composizione finale:<br>Sa + SiO\u2082</span>';
    }
    return '';
  },

  T2y(T,m){return m.T+m.H*(1-(T-this.TVIS[0])/(this.TVIS[1]-this.TVIS[0]));},
  T2yValid(T){return T>=this.TVIS[0]&&T<=this.TVIS[1];},

  drawExtra(ctx,m,cx){
    const s=this;
    const yTp=s.T2y(s.TP,m), yTe=s.T2y(s.TE,m);
    ctx.strokeStyle='#2980b9';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(m.L,yTp);ctx.lineTo(m.L+s.XP*m.W,yTp);ctx.stroke();
    ctx.beginPath();ctx.moveTo(m.L+s.XP*m.W,yTp);ctx.lineTo(m.L+s.XP*m.W,yTe);ctx.stroke();
    ctx.beginPath();ctx.moveTo(m.L+s.XP*m.W,yTe);ctx.lineTo(m.L+m.W,yTe);ctx.stroke();
    // Sa verticale
    ctx.strokeStyle='#8b6914';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(m.L+0.5*m.W,m.T);ctx.lineTo(m.L+0.5*m.W,m.T+m.H);ctx.stroke();ctx.setLineDash([]);
    ctx.font='italic 9px Crimson Pro';ctx.fillStyle='#8b6914';ctx.textAlign='center';
    ctx.fillText('Sa',m.L+0.5*m.W,m.T-8);
    // Punti P e E
    [[s.XP,s.TP,'#8b6914','P '+s.TP],[s.XE,s.TE,'#c0392b','E '+s.TE]].forEach(([x,T,col,lbl])=>{
      ctx.beginPath();ctx.arc(m.L+x*m.W,s.T2y(T,m),5,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();
      ctx.font='italic 9px Crimson Pro';ctx.fillStyle='#c8ccd8';ctx.textAlign='left';
      ctx.fillText(lbl,m.L+x*m.W+7,s.T2y(T,m)-3);
    });
  }
},

// ------------------------------------------------------------------
// 3: Ab-Or solvus con asse spezzato
// ------------------------------------------------------------------
{
  name:'Albite - Ortoclasio', compA:'Ab', compB:'Or',
  desc:'<b>Due soluzioni solide con minimo + solvus.</b> Minimo a 37% Or, 1063C. Due lobi L+S. Solido omogeneo (alkali feldspar). Sotto il solvus: essoluzione pertite.',
  // Asse spezzato
  ZA_TOP:1170, ZA_BOT:1000,
  ZB_TOP:800,  ZB_BOT:400,
  FHI:0.50, FBR:0.07, FLO:0.43,
  TSTART:1170,
  // Parametri fisici
  XM:0.37, TM:1063, TA:1118, TB:1150,
  AL_SX:0.4, BE_SX:2.5, AL_DX:0.5, BE_DX:2.0,
  TPEAK_SOLV:660,
  STEP_DEG:0.4, STEP_LS:0.05,
  PAUSE:120,

  liq(x){
    const s=this;
    if(x<=s.XM)return s.TM+(s.TA-s.TM)*Math.pow((s.XM-x)/s.XM,s.AL_SX);
    return s.TM+(s.TB-s.TM)*Math.pow((x-s.XM)/(1-s.XM),s.AL_DX);
  },
  sol(x){
    const s=this;
    if(x<=s.XM)return s.TM+(s.TA-s.TM)*Math.pow((s.XM-x)/s.XM,s.BE_SX);
    return s.TM+(s.TB-s.TM)*Math.pow((x-s.XM)/(1-s.XM),s.BE_DX);
  },
  solvus(x){return this.TPEAK_SOLV*4*x*(1-x);},
  solvusConj(T){
    const s=this; if(T>=s.TPEAK_SOLV)return[null,null];
    const d=1-T/s.TPEAK_SOLV; if(d<0)return[null,null];
    const sv=Math.sqrt(d); return[(1-sv)/2,(1+sv)/2];
  },
  invLiqSx(T){const s=this;let lo=0,hi=s.XM;for(let i=0;i<80;i++){const m=(lo+hi)/2;if(s.liq(m)>T)lo=m;else hi=m;}return(lo+hi)/2;},
  invLiqDx(T){const s=this;let lo=s.XM,hi=1;for(let i=0;i<80;i++){const m=(lo+hi)/2;if(s.liq(m)<T)lo=m;else hi=m;}return(lo+hi)/2;},
  invSolSx(T){const s=this;let lo=0,hi=s.XM;for(let i=0;i<80;i++){const m=(lo+hi)/2;if(s.sol(m)>T)lo=m;else hi=m;}return(lo+hi)/2;},
  invSolDx(T){const s=this;let lo=s.XM,hi=1;for(let i=0;i<80;i++){const m=(lo+hi)/2;if(s.sol(m)<T)lo=m;else hi=m;}return(lo+hi)/2;},

  buildPath(cx){
    const s=this, path=[];
    const onLeft=cx<=s.XM;
    const Tliq=s.liq(cx), Tsol=s.sol(cx), Tsolv=s.solvus(cx);
    const N0=Math.max(50,Math.round((s.TSTART-Tliq)/s.STEP_DEG));
    for(let i=0;i<=N0;i++){
      const T=s.TSTART-(s.TSTART-Tliq)*i/N0;
      path.push({T,xR:null,tR:null,xB:null,tB:null,xB2:null,tB2:null,phase:'Liquido'});
    }
    const N_LS=Math.max(200,Math.round((Tliq-Tsol)/s.STEP_LS));
    for(let i=1;i<=N_LS;i++){
      const T=Tliq-(Tliq-Tsol)*i/N_LS; if(T<=Tsol)break;
      const xR=onLeft?s.invLiqSx(T):s.invLiqDx(T);
      const xB=onLeft?s.invSolSx(T):s.invSolDx(T);
      path.push({T,xR,tR:T,xB,tB:T,xB2:null,tB2:null,phase:'L + S'});
    }
    const Tend=Math.max(Tsolv,s.ZB_BOT+10);
    const Ns=Math.max(50,Math.round((Tsol-Tend)/s.STEP_DEG));
    for(let i=0;i<=Ns;i++){
      const T=Tsol-i*(Tsol-Tend)/Ns;
      path.push({T,xR:null,tR:null,xB:cx,tB:Tsol,xB2:null,tB2:null,phase:'Solido omogeneo'});
    }
    if(Tsolv>s.ZB_BOT){
      const Ne=Math.max(50,Math.round((Tsolv-s.ZB_BOT)/s.STEP_DEG));
      for(let i=1;i<=Ne;i++){
        const T=Tsolv-i*(Tsolv-s.ZB_BOT)/Ne;
        const[xa,xb]=s.solvusConj(T); if(xa===null)break;
        path.push({T,xR:null,tR:null,xB:xa,tB:s.solvus(xa),xB2:xb,tB2:s.solvus(xb),phase:'Ab + Or (pertite)'});
      }
    }
    return path;
  },

  phaseExtra(fr,cx){
    if(fr.phase==='Solido omogeneo'||fr.phase==='Ab + Or (pertite)'){
      const pOr=(cx*100).toFixed(0), pAb=(100-cx*100).toFixed(0);
      return '<br><span style="font-size:.6rem;color:#c8ccd8">Composizione totale:<br>'+pAb+'% Ab + '+pOr+'% Or</span>';
    }
    return '';
  },

  T2y(T,m){
    const s=this;
    const hHi=m.H*s.FHI, hBr=m.H*s.FBR, hLo=m.H*s.FLO;
    if(T>=s.ZA_BOT&&T<=s.ZA_TOP) return m.T+hHi-(T-s.ZA_BOT)/(s.ZA_TOP-s.ZA_BOT)*hHi;
    if(T>=s.ZB_BOT&&T<=s.ZB_TOP) return m.T+hHi+hBr+hLo-(T-s.ZB_BOT)/(s.ZB_TOP-s.ZB_BOT)*hLo;
    return null;
  },
  T2yValid(T){return T>=this.ZA_BOT&&T<=this.ZA_TOP||T>=this.ZB_BOT&&T<=this.ZB_TOP;},

  drawExtra(ctx,m,cx){
    const s=this;
    const hHi=m.H*s.FHI, hBr=m.H*s.FBR, hLo=m.H*s.FLO;
    const yHiBot=m.T+hHi, yLoTop=yHiBot+hBr, yLoBot=yLoTop+hLo;
    // Interruzione
    ctx.fillStyle='#0d1018'; ctx.fillRect(m.L-52,yHiBot,m.W+57,hBr);
    ctx.strokeStyle='#c8ccd8';ctx.lineWidth=1.5;
    for(let row=0;row<2;row++){
      const yy=yHiBot+hBr*(row+1)/3;
      ctx.beginPath();
      for(let k=0;k<=10;k++){const xx=m.L-48+k*10,yo=k%2===0?3:-3;if(k===0)ctx.moveTo(xx,yy+yo);else ctx.lineTo(xx,yy+yo);}
      ctx.stroke();
    }
    ctx.strokeStyle='#1e2230';ctx.lineWidth=0.8;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(m.L,yHiBot);ctx.lineTo(m.L+m.W,yHiBot);ctx.stroke();
    ctx.beginPath();ctx.moveTo(m.L,yLoTop);ctx.lineTo(m.L+m.W,yLoTop);ctx.stroke();
    ctx.setLineDash([]);
    // Griglia zona alta
    ctx.font='10px JetBrains Mono';ctx.fillStyle='#c8ccd8';
    for(let T=1000;T<=s.ZA_TOP;T+=50){
      const y=s.T2y(T,m); if(y===null)continue;
      ctx.strokeStyle='#1e2230';ctx.lineWidth=.7;
      ctx.beginPath();ctx.moveTo(m.L,y);ctx.lineTo(m.L+m.W,y);ctx.stroke();
      ctx.textAlign='right';ctx.fillText(T+'',m.L-4,y+4);
    }
    // Griglia zona bassa
    for(let T=s.ZB_BOT;T<=s.ZB_TOP;T+=50){
      const y=s.T2y(T,m); if(y===null)continue;
      ctx.strokeStyle='#1e2230';ctx.lineWidth=.7;
      ctx.beginPath();ctx.moveTo(m.L,y);ctx.lineTo(m.L+m.W,y);ctx.stroke();
      ctx.textAlign='right';ctx.fillText(T+'',m.L-4,y+4);
    }
    // Griglia x in entrambe le zone
    for(let i=0;i<=10;i++){
      const px=m.L+i/10*m.W;
      ctx.strokeStyle='#1e2230';ctx.lineWidth=.7;
      ctx.beginPath();ctx.moveTo(px,m.T);ctx.lineTo(px,yHiBot);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px,yLoTop);ctx.lineTo(px,yLoBot);ctx.stroke();
    }
    // Assi
    ctx.strokeStyle='#c8ccd8';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(m.L,m.T);ctx.lineTo(m.L,yHiBot);ctx.stroke();
    ctx.beginPath();ctx.moveTo(m.L,yLoTop);ctx.lineTo(m.L,yLoBot);ctx.stroke();
    ctx.beginPath();ctx.moveTo(m.L,yLoBot);ctx.lineTo(m.L+m.W,yLoBot);ctx.stroke();
    // Minimo
    const yMin=s.T2y(s.TM,m);
    if(yMin!==null){
      ctx.beginPath();ctx.arc(m.L+s.XM*m.W,yMin,5,0,2*Math.PI);ctx.fillStyle='#00d4ff';ctx.fill();
      ctx.font='italic 9px Crimson Pro';ctx.fillStyle='#c8ccd8';ctx.textAlign='left';
      ctx.fillText('Min '+s.TM,m.L+s.XM*m.W+7,yMin-4);
    }
    // Labels campi
    ctx.font='italic 9px Crimson Pro';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,212,255,.5)';ctx.fillText('LIQUIDO',m.L+m.W/2,m.T+18);
    ctx.fillStyle='rgba(168,255,120,.4)';ctx.fillText('Alkali Feldspar ss',m.L+m.W/2,yHiBot-14);
    ctx.fillStyle='rgba(168,255,120,.4)';ctx.fillText('Solido omogeneo',m.L+m.W/2,yLoTop+18);
    ctx.fillStyle='rgba(168,255,120,.5)';ctx.fillText('Ab + Or (pertite)',m.L+m.W/2,yLoBot-14);
  }
}

]; // fine SYSTEMS

// =====================================================================
// STATO GLOBALE
// =====================================================================
let cs=0, cx=0.5, spd=1, anim=false, frameIdx=0, path=[], lastTs=null, accumulator=0;
const C=document.getElementById('c'), ctx=C.getContext('2d');

function sys(){return SYSTEMS[cs];}

function rebuildPath(){
  const s=sys();
  path=s.buildPath(cx);
  frameIdx=0; accumulator=0;
}

// =====================================================================
// COORDINATE (delegano al sistema corrente)
// =====================================================================
function resize(){const r=C.getBoundingClientRect();C.width=Math.round(r.width);C.height=Math.round(r.height);draw();}
window.addEventListener('resize',resize);

function mg(){
  // Per Ab-Or l'asse y arriva a yLoBot, per gli altri a m.T+m.H
  return{L:70,T:26,W:C.width-90,H:C.height-68};
}

// =====================================================================
// DISEGNO
// =====================================================================
function dot(px,py,col,r){
  if(py===null||py===undefined||py<-20||py>C.height+20)return;
  ctx.beginPath();ctx.arc(px,py,r+2,0,2*Math.PI);ctx.fillStyle='#07090e';ctx.fill();
  ctx.beginPath();ctx.arc(px,py,r,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();
}

function draw(){
  const W=C.width,H=C.height; if(!W||!H)return;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#07090e';ctx.fillRect(0,0,W,H);
  const m=mg(), s=sys();

  // --- Campi colore ---
  const isAbOr=(cs===3);
  if(!isAbOr){
    for(let i=0;i<300;i++){
      const x=(i+.5)/300, Tl=s.liq(x), Ts=s.sol(x);
      const px=m.L+i/300*m.W, pw=m.W/300+1;
      const yL=s.T2y(Tl,m), yS=s.T2y(Ts,m), yT=m.T, yB=m.T+m.H;
      if(yL>yT){ctx.fillStyle='rgba(0,212,255,.06)';ctx.fillRect(px,yT,pw,Math.min(yL,yB)-yT);}
      if(Tl>Ts&&yS>yT&&yL<yB){ctx.fillStyle='rgba(255,107,53,.08)';ctx.fillRect(px,Math.max(yL,yT),pw,Math.min(yS,yB)-Math.max(yL,yT));}
      if(yS<yB){ctx.fillStyle='rgba(168,255,120,.06)';ctx.fillRect(px,Math.max(yS,yT),pw,yB-Math.max(yS,yT));}
    }
  } else {
    // Ab-Or: campi nelle due zone
    const hHi=m.H*s.FHI, hBr=m.H*s.FBR, hLo=m.H*s.FLO;
    const yHiBot=m.T+hHi, yLoTop=yHiBot+hBr, yLoBot=yLoTop+hLo;
    for(let i=0;i<400;i++){
      const x=(i+.5)/400, Tl=s.liq(x), Ts=s.sol(x), Tv=s.solvus(x);
      const px=m.L+i/400*m.W, pw=m.W/400+1;
      // Zona alta
      if(Tl>Ts){
        const yL=s.T2y(Math.min(Tl,s.ZA_TOP),m), y2=s.T2y(s.ZA_BOT,m);
        if(yL!==null&&y2!==null&&y2>yL){ctx.fillStyle='rgba(0,212,255,.06)';ctx.fillRect(px,yL,pw,Math.min(y2,yHiBot)-yL);}
        const yLb=s.T2y(Math.max(Tl,s.ZA_BOT),m), ySa=s.T2y(Math.min(Ts,s.ZA_TOP),m);
        if(yLb!==null&&ySa!==null&&ySa>yLb){ctx.fillStyle='rgba(255,107,53,.08)';ctx.fillRect(px,yLb,pw,Math.min(ySa,yHiBot)-yLb);}
      }
      const yS2=s.T2y(Math.max(Ts,s.ZA_BOT),m);
      if(yS2!==null){ctx.fillStyle='rgba(168,255,120,.06)';ctx.fillRect(px,yS2,pw,yHiBot-yS2);}
      // Zona bassa
      const yV=Tv>s.ZB_BOT&&Tv<s.ZB_TOP?s.T2y(Tv,m):null;
      if(yV!==null){
        ctx.fillStyle='rgba(168,255,120,.06)';ctx.fillRect(px,yLoTop,pw,yV-yLoTop);
        ctx.fillStyle='rgba(168,255,120,.09)';ctx.fillRect(px,yV,pw,yLoBot-yV);
      } else {
        ctx.fillStyle='rgba(168,255,120,.06)';ctx.fillRect(px,yLoTop,pw,yLoBot-yLoTop);
      }
    }
  }

  // --- Griglia e assi (non Ab-Or, che li gestisce in drawExtra) ---
  if(!isAbOr){
    ctx.font='10px JetBrains Mono';ctx.fillStyle='#c8ccd8';
    const Tv=s.TVIS, step=Tv[1]-Tv[0]>400?100:50;
    for(let T=Math.ceil(Tv[0]/step)*step;T<=Tv[1];T+=step){
      const y=s.T2y(T,m); if(y<m.T||y>m.T+m.H)continue;
      ctx.strokeStyle='#1e2230';ctx.lineWidth=.7;
      ctx.beginPath();ctx.moveTo(m.L,y);ctx.lineTo(m.L+m.W,y);ctx.stroke();
      ctx.textAlign='right';ctx.fillText(T+'',m.L-4,y+4);
    }
    for(let i=0;i<=10;i++){
      const px=m.L+i/10*m.W;
      ctx.strokeStyle='#1e2230';ctx.lineWidth=.7;
      ctx.beginPath();ctx.moveTo(px,m.T);ctx.lineTo(px,m.T+m.H);ctx.stroke();
      if(i%2===0){ctx.textAlign='center';ctx.fillStyle='#c8ccd8';ctx.fillText(i*10+'%',px,m.T+m.H+16);}
    }
    ctx.strokeStyle='#c8ccd8';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(m.L,m.T);ctx.lineTo(m.L,m.T+m.H);ctx.lineTo(m.L+m.W,m.T+m.H);ctx.stroke();
    ctx.fillStyle='#c8ccd8';ctx.font='italic 11px Crimson Pro';
    ctx.textAlign='center';ctx.fillText('% '+s.compB,m.L+m.W/2,m.T+m.H+32);
    ctx.save();ctx.translate(14,m.T+m.H/2);ctx.rotate(-Math.PI/2);ctx.fillText('Temperatura (C)',0,0);ctx.restore();
    ctx.font='italic 10px Crimson Pro';
    ctx.textAlign='left';ctx.fillText(s.compA,m.L,m.T+m.H+42);
    ctx.textAlign='right';ctx.fillText(s.compB,m.L+m.W,m.T+m.H+42);
  } else {
    // Ab-Or: label assi
    const hHi=m.H*s.FHI,hBr=m.H*s.FBR,hLo=m.H*s.FLO;
    const yLoBot=m.T+hHi+hBr+hLo;
    ctx.fillStyle='#c8ccd8';ctx.font='italic 11px Crimson Pro';
    ctx.textAlign='center';ctx.fillText('% Or',m.L+m.W/2,yLoBot+32);
    ctx.save();ctx.translate(14,m.T+m.H/2);ctx.rotate(-Math.PI/2);ctx.fillText('Temperatura (C)',0,0);ctx.restore();
    ctx.font='italic 10px Crimson Pro';
    ctx.textAlign='left';ctx.fillText('Ab',m.L,yLoBot+42);
    ctx.textAlign='right';ctx.fillText('Or',m.L+m.W,yLoBot+42);
  }

  // --- Titolo ---
  ctx.font='bold italic 13px Crimson Pro';ctx.fillStyle='#00d4ff';
  ctx.textAlign='left';ctx.fillText(s.name,m.L,m.T-6);

  // --- Curve liquidus e solidus ---
  function crv(fn,col,lw,dash){
    if(dash)ctx.setLineDash(dash);
    ctx.strokeStyle=col;ctx.lineWidth=lw;
    const zones=isAbOr?[[s.ZA_BOT,s.ZA_TOP],[s.ZB_BOT,s.ZB_TOP]]:[[s.TVIS[0],s.TVIS[1]]];
    zones.forEach(([zlo,zhi])=>{
      ctx.beginPath();let f=true;
      for(let i=0;i<=400;i++){
        const x=i/400, t=fn(x);
        if(t<zlo||t>zhi){f=true;continue;}
        const py=s.T2y(t,m); if(py===null){f=true;continue;}
        const px=m.L+x*m.W;
        if(f){ctx.moveTo(px,py);f=false;}else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }
  crv(x=>s.liq(x),'#00d4ff',2.5,null);
  if(cs!==2) crv(x=>s.sol(x),'#ff6b35',2,null);
  if(cs===3) crv(x=>{const t=s.solvus(x);return s.T2yValid(t)?t:-1;},'#a8ff78',2,[5,4]);

  // --- Linea verticale composizione ---
  ctx.strokeStyle='rgba(200,204,216,.15)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
  if(isAbOr){
    const hHi=m.H*s.FHI,hBr=m.H*s.FBR,hLo=m.H*s.FLO;
    const yHiBot=m.T+hHi,yLoTop=yHiBot+hBr,yLoBot=yLoTop+hLo;
    const px=m.L+cx*m.W;
    ctx.beginPath();ctx.moveTo(px,m.T);ctx.lineTo(px,yHiBot);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px,yLoTop);ctx.lineTo(px,yLoBot);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(m.L+cx*m.W,m.T);ctx.lineTo(m.L+cx*m.W,m.T+m.H);ctx.stroke();
  }
  ctx.setLineDash([]);

  // --- Extra specifico del sistema (solidus speciale, punti invarianti, ecc.) ---
  s.drawExtra(ctx,m,cx);

  // --- Punti animati ---
  if(path.length===0)return;
  const fi=Math.min(frameIdx,path.length-1);
  const frRaw=path[fi];
  // Normalizza frame (Lc-SiO2 usa xRed/xBlue)
  const fr=s.normalizeFrame?s.normalizeFrame(frRaw):{...frRaw};

  function dotT(x,T,col,r){
    if(x===null||T===null)return;
    let py=s.T2y(T,m);
    if(py===null&&isAbOr){
      // Zona interruzione: mostra al centro della fascia
      const hHi=m.H*s.FHI,hBr=m.H*s.FBR;
      py=m.T+hHi+hBr/2;
    }
    dot(m.L+x*m.W,py,col,r);
  }

  // Ordine disegno: blu1, blu2, rosso, verde (verde sempre in primo piano)
  dotT(fr.xB,fr.tB,'#ff6b35',7);
  dotT(fr.xB2,fr.tB2,'#ff6b35',7);
  // Rosso con anello
  if(fr.xR!==null&&fr.tR!==null){
    let pyR=s.T2y(fr.tR,m);
    if(pyR===null&&isAbOr){const hHi=m.H*s.FHI,hBr=m.H*s.FBR;pyR=m.T+hHi+hBr/2;}
    const pxR=m.L+fr.xR*m.W;
    ctx.beginPath();ctx.arc(pxR,pyR,12,0,2*Math.PI);ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.stroke();
    dot(pxR,pyR,'#00d4ff',7);
    // Label % in basso
    const yBot=isAbOr?(m.T+m.H*s.FHI+m.H*s.FBR+m.H*s.FLO):m.T+m.H;
    ctx.font='bold 9px JetBrains Mono';ctx.textAlign='center';
    ctx.fillStyle='#07090e';ctx.fillRect(pxR-17,yBot+17,34,13);
    ctx.fillStyle='#00d4ff';ctx.fillText((fr.xR*100).toFixed(1)+'%',pxR,yBot+28);
  }
  // Verde per ultimo
  dotT(cx,fr.T,'#a8ff78',7);

  // --- UI ---
  const phLabel=fr.phase.replace(' (pausa)','');
  document.getElementById('tv').textContent=fr.T.toFixed(0)+' C';
  document.getElementById('iT').textContent=fr.T.toFixed(0)+'C';
  document.getElementById('iR').textContent=fr.xR!==null?(fr.xR*100).toFixed(1)+'%':'-';
  document.getElementById('iB').textContent=fr.xB!==null?(fr.xB*100).toFixed(1)+'%':'-';
  document.getElementById('iP').textContent=phLabel;
  document.getElementById('ph').innerHTML='<b>'+phLabel+'</b>'+(s.phaseExtra(frRaw,cx)||'');
}

// =====================================================================
// ANIMAZIONE
// =====================================================================
function animLoop(ts){
  if(!anim)return;
  if(lastTs!==null){
    const dt=(ts-lastTs)/1000;
    accumulator+=path.length/12*spd*dt;
    const steps=Math.floor(accumulator);
    accumulator-=steps;
    frameIdx+=Math.max(1,steps);
    if(frameIdx>=path.length){frameIdx=path.length-1;anim=false;accumulator=0;document.getElementById('btnP').textContent='\u25B6 Raffredda';}
  }
  lastTs=ts;draw();if(anim)requestAnimationFrame(animLoop);
}

// =====================================================================
// CONTROLLI
// =====================================================================
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  b.classList.add('on'); cs=parseInt(b.dataset.s);
  // Imposta cx e slider in base al sistema
  const defaults=[0.5,0.5,0.25,0.5];
  cx=defaults[cs];
  document.getElementById('xs').value=Math.round(cx*100);
  document.getElementById('xv').textContent=Math.round(cx*100)+'%';
  document.getElementById('desc').innerHTML=sys().desc;
  anim=false;lastTs=null;accumulator=0;
  rebuildPath();draw();
  document.getElementById('btnP').textContent='\u25B6 Raffredda';
}));

document.getElementById('xs').addEventListener('input',e=>{
  cx=parseInt(e.target.value)/100;
  document.getElementById('xv').textContent=(cx*100).toFixed(0)+'%';
  anim=false;lastTs=null;accumulator=0;rebuildPath();draw();
  document.getElementById('btnP').textContent='\u25B6 Raffredda';
});
document.getElementById('sps').addEventListener('input',e=>{
  spd=parseFloat(e.target.value);document.getElementById('spv').textContent=spd.toFixed(1)+'x';
});
document.getElementById('btnP').addEventListener('click',()=>{
  if(anim){anim=false;lastTs=null;document.getElementById('btnP').textContent='\u25B6 Raffredda';}
  else{if(frameIdx>=path.length-1)rebuildPath();anim=true;document.getElementById('btnP').textContent='\u23F8 Pausa';requestAnimationFrame(animLoop);}
});
document.getElementById('btnR').addEventListener('click',()=>{
  anim=false;lastTs=null;accumulator=0;rebuildPath();draw();
  document.getElementById('btnP').textContent='\u25B6 Raffredda';
});

// Avvio
document.getElementById('desc').innerHTML=sys().desc;
rebuildPath();
setTimeout(()=>resize(),80);
</script>
</body>
