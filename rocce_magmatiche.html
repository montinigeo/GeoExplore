.tabs{display:flex;gap:.2rem;margin-left:auto}
.tab{padding:.22rem .8rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:.58rem;cursor:pointer;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;transition:all .15s}
.tab.on,.tab:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06)}
.main{display:flex;flex:1;min-height:0}
.sb{width:210px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);padding:.6rem;display:flex;flex-direction:column;gap:.4rem;overflow-y:auto}
.sl{font-size:.5rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);padding-bottom:.1rem;margin-bottom:.1rem}
.btn{width:100%;padding:.2rem .4rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Crimson Pro',serif;font-size:.75rem;cursor:pointer;border-radius:3px;transition:all .15s;text-align:left;padding-left:.5rem}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.07)}
.tog{display:flex;gap:.2rem}
.tog .btn{font-size:.62rem;text-align:center;padding:.18rem 0}
.cw{flex:1;min-width:0;position:relative}
canvas{width:100%;height:100%;display:block}
#infoBox{position:absolute;bottom:10px;right:10px;width:240px;background:rgba(7,9,14,.93);border:1px solid var(--border);border-radius:5px;padding:.55rem .75rem;font-family:'Crimson Pro',serif;font-size:.62rem;line-height:1.8;color:var(--muted);pointer-events:none;display:none}

function layout(){
  const W=C.width,H=C.height;
  const pL=55,pR=15,pT=38,pB=32,gap=28;
  const tw=Math.floor((W-pL-pR-gap)/2);
  const th=Math.floor(tw*0.866);
  const ty=Math.floor(pT+(H-pT-pB-th)/2);
  return {W,H,tw,th,ty,by:ty+th,qx:pL,fx:pL+tw+gap};
}
function qapXY(Q,AP,L){
  const q=Q/100,a=(1-q)*AP,p=(1-q)*(1-AP);
  return [L.qx+q*(L.tw/2)+p*L.tw, L.ty+a*L.th+p*L.th];
}
function fapXY(F,AP,L){
  const f=F/100,a=(1-f)*AP,p=(1-f)*(1-AP);
  return [L.fx+a*0+p*L.tw+f*(L.tw/2), L.ty+f*L.th];
}
function qapInv(px,py,L){
  const Qx=L.qx+L.tw/2,Qy=L.ty,Ax=L.qx,Ay=L.by,Px=L.qx+L.tw,Py=L.by;
  const D=(Ay-Py)*(Px-Qx)+(Px-Ax)*(Qy-Py);if(!D)return null;
  const q=((Ay-Py)*(px-Px)+(Px-Ax)*(py-Py))/D;
  const a=((Py-Qy)*(px-Px)+(Qx-Px)*(py-Py))/D;
  const p=1-q-a;
  if(q<-0.01||a<-0.01||p<-0.01)return null;
  return {Q:q*100,AP:q>0.999?0.5:a/(a+p)};
}
function fapInv(px,py,L){
  const Ax=L.fx,Ay=L.ty,Px=L.fx+L.tw,Py=L.ty,Fx=L.fx+L.tw/2,Fy=L.by;
  const D=(Ay-Py)*(Px-Fx)+(Px-Ax)*(Fy-Py);if(!D)return null;
  const f=((Ay-Py)*(px-Px)+(Px-Ax)*(py-Py))/D;
  const a=((Py-Fy)*(px-Px)+(Fx-Px)*(py-Py))/D;
  const p=1-f-a;
  if(f<-0.01||a<-0.01||p<-0.01)return null;
  return {F:f*100,AP:f>0.999?0.5:a/(a+p)};
}
function findQAP(Q,AP){return QAPF.find(f=>Q>=f.Q[0]&&Q<f.Q[1]&&AP>=f.AP[0]&&AP<f.AP[1]);}
function findFAP(F,AP){
  const Fe=Math.max(F,10.01);
  return FAP.find(f=>{if(f.F[1]===100)return Fe>=60;return Fe>=f.F[0]&&Fe<f.F[1]&&AP>=f.AP[0]&&AP<f.AP[1];});
}

function lbl(t,x,y,fill,font,align){
  ctx.font=font;ctx.textAlign=align||'center';
  ctx.strokeStyle='rgba(5,7,12,0.95)';ctx.lineWidth=3.5;ctx.lineJoin='round';
  ctx.strokeText(t,x,y);ctx.fillStyle=fill;ctx.fillText(t,x,y);
}

function showQapfInfo(f){
  if(!f){hideInfo();return;}
  const nome=mode==='plut'?f.plut:f.volc;
  const sig=mode==='plut'?f.sig:f.sigV;
  const info=QAPF_INFO[f.plut]||{};
  showInfo(`<b>(${sig}) ${nome}</b><br>
    ${info.SiO2?`<b>SiO₂:</b> <span class="val">${info.SiO2}</span><br>`:''}
    ${info.min?`<b>Minerali:</b> <span class="acc">${info.min}</span><br>`:''}
    ${info.strut?`<b>Struttura:</b> ${info.strut}<br>`:''}
    ${info.giac?`<b>Giacitura:</b> ${info.giac}`:''}
    ${f.SiO2&&!info.SiO2?`<b>SiO₂:</b> <span class="val">${f.SiO2}</span><br>`:''}
    ${f.min&&!info.min?`<b>Minerali:</b> <span class="acc">${f.min}</span><br>`:''}
    ${f.strut&&!info.strut?`<b>Struttura:</b> ${f.strut}<br>`:''}
    ${f.giac&&!info.giac?`<b>Giacitura:</b> ${f.giac}`:''}
  `);
}

// =====================================================================
// DRAW QAPF
// =====================================================================
function drawQAPF(){
  const L=layout();
  ctx.clearRect(0,0,L.W,L.H);ctx.fillStyle='#07090e';ctx.fillRect(0,0,L.W,L.H);

  function sector(pts,col,f,hi){
    ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));
    ctx.closePath();
    ctx.fillStyle=col;ctx.globalAlpha=hi?0.85:0.55;ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle=hi?'rgba(255,255,255,0.6)':'rgba(200,204,216,0.2)';
    ctx.lineWidth=hi?1.8:0.8;ctx.stroke();
    const cx2=pts.reduce((s,[x])=>s+x,0)/pts.length;
    const cy2=pts.reduce((s,[,y])=>s+y,0)/pts.length;
    const sig=mode==='volc'&&f.sigV?f.sigV:f.sig;
    lbl(sig,cx2,cy2+4,hi?'#fff':'rgba(230,234,248,0.9)','bold 10px Space Mono');
  }

  // QAP settori
  QAPF.forEach(f=>{
    const hi=(hovQ&&hovQ.sig===f.sig)||(selQ&&selQ.sig===f.sig);
    let pts;
    if(f.Q[1]===100){const ap=qapXY(100,0.5,L);pts=[qapXY(f.Q[0],f.AP[0],L),qapXY(f.Q[0],f.AP[1],L),ap];}
    else{pts=[qapXY(f.Q[0],f.AP[0],L),qapXY(f.Q[0],f.AP[1],L),qapXY(f.Q[1],f.AP[1],L),qapXY(f.Q[1],f.AP[0],L)];}
    sector(pts,f.col,f,hi);
  });

  // FAP settori
  FAP.forEach(f=>{
    const hi=(hovF&&hovF.sig===f.sig)||(selF&&selF.sig===f.sig);
    let pts;
    if(f.F[1]===100){pts=[fapXY(60,0,L),fapXY(60,1,L),fapXY(100,0.5,L)];}
    else{pts=[fapXY(0,f.AP[0],L),fapXY(0,f.AP[1],L),fapXY(f.F[1],f.AP[1],L),fapXY(f.F[1],f.AP[0],L)];}
    sector(pts,f.col,f,hi);
  });

  // Linea F=10% tratteggiata
  ctx.strokeStyle='rgba(200,204,216,0.18)';ctx.lineWidth=0.7;
  ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(...fapXY(10,0,L));ctx.lineTo(...fapXY(10,1,L));ctx.stroke();
  ctx.setLineDash([]);
  {const[lx,ly]=fapXY(10,0.5,L);lbl('F=10%',lx+4,ly-2,'rgba(180,184,200,0.4)','7px Space Mono','left');}

  // Bordi e linee interne
  function tri(pts){
    ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));
    ctx.closePath();ctx.strokeStyle='rgba(200,204,216,0.7)';ctx.lineWidth=1.8;ctx.stroke();
  }
  tri([qapXY(100,0.5,L),qapXY(0,0,L),qapXY(0,1,L)]);
  tri([fapXY(0,0,L),fapXY(0,1,L),fapXY(100,0.5,L)]);
  ctx.strokeStyle='rgba(200,204,216,0.18)';ctx.lineWidth=0.7;
  [5,20,60].forEach(Q=>{ctx.beginPath();ctx.moveTo(...qapXY(Q,0,L));ctx.lineTo(...qapXY(Q,1,L));ctx.stroke();});
  [0.1,0.35,0.65,0.9].forEach(AP=>{ctx.beginPath();ctx.moveTo(...qapXY(0,AP,L));ctx.lineTo(...qapXY(100,AP,L));ctx.stroke();});
  ctx.beginPath();ctx.moveTo(...fapXY(60,0,L));ctx.lineTo(...fapXY(60,1,L));ctx.stroke();
  [0.1,0.35,0.65,0.9].forEach(AP=>{ctx.beginPath();ctx.moveTo(...fapXY(10,AP,L));ctx.lineTo(...fapXY(100,AP,L));ctx.stroke();});

  // Etichette vertici QAP
  function vtx(x,y,s1,s2,dx,align){
    lbl(s1,x+dx,y,         '#c8ccd8','bold 13px Space Mono',align);
    lbl(s2,x+dx,y+14,'#8a8e9a','italic 10px Crimson Pro',align);
  }
  const[Qx,Qy]=qapXY(100,0.5,L);vtx(Qx,Qy-12,'Q','Quarzo',0,'center');
  const[Ax,Ay]=qapXY(0,0,L);vtx(Ax,Ay+6,'A','Fsp alc.',-14,'right');
  const[Px_,Py_]=qapXY(0,1,L);vtx(Px_,Py_+6,'P','Plagioclasio',14,'left');
  const[fAx,fAy]=fapXY(0,0,L);vtx(fAx,fAy-8,'A','Fsp alc.',-14,'right');
  const[fPx,fPy]=fapXY(0,1,L);vtx(fPx,fPy-8,'P','Plagioclasio',14,'left');
  const[fFx,fFy]=fapXY(100,0.5,L);vtx(fFx,fFy+14,'F','Feldspatoidi',0,'center');

  // Titoli
  ctx.font='italic 10px Crimson Pro';ctx.fillStyle='rgba(200,204,216,0.6)';ctx.textAlign='center';
  ctx.fillText(mode==='plut'?'ROCCE PLUTONICHE':'ROCCE VULCANICHE',L.qx+L.tw/2,L.ty-20);
  ctx.fillText('ROCCE SOTTOSATURATE',L.fx+L.tw/2,L.ty-20);

  // Percentuali Q
  ctx.font='8px Space Mono';ctx.fillStyle='#8a8e9a';ctx.textAlign='right';
  [20,40,60,80].forEach(q=>{const[x,y]=qapXY(q,0,L);ctx.fillText(q+'%',x-4,y+3);});

  // Cursore
  if(mx!==null){
    ctx.beginPath();ctx.arc(mx,my,4,0,2*Math.PI);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.stroke();
  }
}

// =====================================================================
// DRAW MAFICHE
// =====================================================================
function drawMafiche(){
  const W=C.width,H=C.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#07090e';ctx.fillRect(0,0,W,H);
  const pad=65;
  const tw=Math.min(W-pad*2-40,H-pad*2);
  const th=Math.floor(tw*0.866);
  const tx0=Math.floor((W-tw)/2)+20,ty0=Math.floor((H-th)/2);
  const Ax=tx0+tw/2,Ay=ty0,Bx=tx0,By=ty0+th,Cx=tx0+tw,Cy=ty0+th;

  function toXY(a,b,c){const t=a+b+c||1;return [(a/t)*Ax+(b/t)*Bx+(c/t)*Cx,(a/t)*Ay+(b/t)*By+(c/t)*Cy];}
  function invXY(px,py){
    const D=(By-Cy)*(Cx-Ax)+(Cx-Bx)*(Ay-Cy);if(!D)return null;
    const a=((By-Cy)*(px-Cx)+(Cx-Bx)*(py-Cy))/D;
    const b=((Cy-Ay)*(px-Cx)+(Ax-Cx)*(py-Cy))/D;const c2=1-a-b;
    if(a<-0.01||b<-0.01||c2<-0.01)return null;
    return {a:a*100,b:b*100,c:c2*100};
  }
  _triM={toXY,invXY};

  // Sfondo triangolo
  ctx.beginPath();ctx.moveTo(Ax,Ay);ctx.lineTo(Bx,By);ctx.lineTo(Cx,Cy);ctx.closePath();
  ctx.fillStyle='#0d1018';ctx.fill();

  // Griglia
  ctx.strokeStyle='rgba(30,34,48,0.8)';ctx.lineWidth=0.6;
  [20,40,60,80].forEach(p=>{
    const t=p/100;
    function l(x1,y1,x2,y2,tt){return [x1+(x2-x1)*tt,y1+(y2-y1)*tt];}
    let[x1,y1]=l(Ax,Ay,Bx,By,t),[x2,y2]=l(Cx,Cy,Bx,By,t);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    [x1,y1]=l(Ax,Ay,Cx,Cy,t);[x2,y2]=l(Bx,By,Cx,Cy,t);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    [x1,y1]=l(Bx,By,Ax,Ay,t);[x2,y2]=l(Cx,Cy,Ax,Ay,t);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });

  // Settori
  MAFICHE.forEach(f=>{
    const hi=selM===f.n;
    ctx.beginPath();f.v.forEach(([a,b,c2],i)=>{const[x,y]=toXY(a,b,c2);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.closePath();
    ctx.fillStyle=f.col;ctx.globalAlpha=hi?0.85:0.55;ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle=hi?'rgba(255,255,255,0.7)':'rgba(200,204,216,0.2)';ctx.lineWidth=hi?1.8:0.8;ctx.stroke();
    const ca=f.v.reduce((s,[a])=>s+a,0)/f.v.length;
    const cb=f.v.reduce((s,[,b])=>s+b,0)/f.v.length;
    const cc=f.v.reduce((s,[,,c2])=>s+c2,0)/f.v.length;
    const[lx,ly]=toXY(ca,cb,cc);
    const words=f.n.split(/[ /]/);
    const lines=words.length>2?[words.slice(0,Math.ceil(words.length/2)).join(' '),words.slice(Math.ceil(words.length/2)).join(' ')]:[f.n];
    lines.forEach((ln,i)=>lbl(ln,lx,ly+(i-(lines.length-1)/2)*13,hi?'#fff':'rgba(230,234,248,0.9)','bold 10px Crimson Pro'));
  });

  // Bordo
  ctx.beginPath();ctx.moveTo(Ax,Ay);ctx.lineTo(Bx,By);ctx.lineTo(Cx,Cy);ctx.closePath();
  ctx.strokeStyle='rgba(200,204,216,0.7)';ctx.lineWidth=2;ctx.stroke();

  // % asse sin
  ctx.font='9px Space Mono';ctx.fillStyle='#8a8e9a';ctx.textAlign='right';
  [20,40,60,80].forEach(p=>{const t=p/100;const x=Ax+(Bx-Ax)*t-12,y=Ay+(By-Ay)*t;ctx.fillText(p+'%',x,y+3);});

  // Vertici
  lbl('Ol','Olivina',Ax,Ay-28,Ay-14,'#c8ccd8','#8a8e9a');
  function vtxM(x,y,s1,s2,dx,align){
    lbl(s1,x+dx,y,'#c8ccd8','bold 13px Space Mono',align);
    lbl(s2,x+dx,y+14,'#8a8e9a','italic 10px Crimson Pro',align);
  }
  vtxM(Ax,Ay-14,'Ol','Olivina',0,'center');
  vtxM(Bx,By+8,'Opx','Ortopirosseno',-14,'right');
  vtxM(Cx,Cy+8,'Cpx','Clinopirosseno',14,'left');

  // Info campione selezionato
  if(selM){
    const f=MAFICHE.find(f=>f.n===selM);
    if(f)showInfo(`<b>${f.n}</b><br>
      <b>Minerali:</b> <span class="acc">${f.min}</span><br>
      <b>SiO₂:</b> <span class="val">${f.SiO2}</span> &nbsp;
      <b>Densità:</b> <span class="val">${f.dens} g/cm³</span><br>
      <b>Giacitura:</b> ${f.giac}<br><br>
      <span style="font-style:italic;font-size:.6rem">${f.note}</span>`);
  }
}

// DRAW
// =====================================================================
function draw(){
  if(tab==='qapf')drawQAPF();
  else if(tab==='mafiche')drawMafiche();
  else if(tab==='piro')drawPiro();
  else drawSpeciali();
}

// =====================================================================
// MOUSE
// =====================================================================
C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect();
  mx=(e.clientX-r.left)*(C.width/r.width);
  my=(e.clientY-r.top)*(C.height/r.height);

  if(tab==='qapf'){
    const L=layout();
    const q=qapInv(mx,my,L);
    if(q){const f=findQAP(q.Q,q.AP);if(f){hovQ=f;hovF=null;if(!selQ&&!selF)showQapfInfo(f);draw();return;}}
    const fp=fapInv(mx,my,L);
    if(fp){const f=findFAP(fp.F,fp.AP);if(f){hovF=f;hovQ=null;if(!selQ&&!selF)showQapfInfo(f);draw();return;}}
    hovQ=null;hovF=null;if(!selQ&&!selF)hideInfo();draw();
  } else if(tab==='mafiche'&&_triM){
    const coords=_triM.invXY(mx,my);
    if(coords){
      function inP(pts,pa,pb,pc){const n=pts.length;let ins=false,j=n-1;
        for(let i=0;i<n;i++){const[ai,bi]=pts[i],[aj,bj]=pts[j];
          if((bi>pb)!==(bj>pb)&&pa<(aj-ai)*(pb-bi)/(bj-bi)+ai)ins=!ins;j=i;}return ins;}
      const f=MAFICHE.find(f=>inP(f.v,coords.a,coords.b,coords.c));
      if(f&&!selM)showInfo(`<b>${f.n}</b><br><b>Minerali:</b> <span class="acc">${f.min}</span><br><b>SiO₂:</b> <span class="val">${f.SiO2}</span><br><b>Giacitura:</b> ${f.giac}`);
      else if(!f&&!selM)hideInfo();
    } else if(!selM)hideInfo();
  }
});
C.addEventListener('mouseleave',()=>{
  mx=null;my=null;hovQ=null;hovF=null;
  if(!selQ&&!selF&&!selM)hideInfo();
  draw();
});

// =====================================================================
// DRAW PIROCLASTICHE
// =====================================================================
let selPG=null,selPR=null,selPC=null;

function drawPiro(){
  const W=C.width,H=C.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#07090e';ctx.fillRect(0,0,W,H);
  const pL=20,pT=30,pR=20,pB=20;
  const gW=W-pL-pR,gH=H-pT-pB;

  // Layout: asse granulometria verticale (sinistra) + zona composizione (destra)
  // Schema a matrice: righe=rocce, colonne=composizione
  const colW=gW*0.28,matX=pL+colW+20;
  const matW=gW-colW-40;

  // --- Asse granulometria (verticale, sinistra) ---
  const granuArr=[
    {id:'blocchi',  n:'Blocchi / Bombe', d:'>64 mm',   col:'#8a3a1a',y:0.10},
    {id:'lapilli',  n:'Lapilli',          d:'2–64 mm',  col:'#7a5a2a',y:0.30},
    {id:'cenere_g', n:'Cenere grossolana',d:'0.06–2 mm',col:'#6a6a3a',y:0.55},
    {id:'cenere_f', n:'Cenere fine',       d:'<0.06 mm', col:'#5a7a4a',y:0.75},
  ];
  // Disegna scala granulometrica come barra verticale
  const barX=pL+8,barW=18,barTop=pT+gH*0.05,barBot=pT+gH*0.95;
  // Gradiente
  const grad=ctx.createLinearGradient(0,barTop,0,barBot);
  grad.addColorStop(0,'#8a3a1a');grad.addColorStop(0.4,'#7a5a2a');
  grad.addColorStop(0.65,'#6a6a3a');grad.addColorStop(1,'#5a7a4a');
  ctx.fillStyle=grad;ctx.fillRect(barX,barTop,barW,barBot-barTop);
  ctx.strokeStyle='rgba(200,204,216,0.3)';ctx.lineWidth=1;ctx.strokeRect(barX,barTop,barW,barBot-barTop);
  lbl('Φ (mm)',barX+barW/2,barTop-16,'#c8ccd8','bold 10px Space Mono');
  lbl('granulometria',barX+barW/2,barTop-4,'#8a8e9a','italic 9px Crimson Pro');

  // lblG non usata

  granuArr.forEach(g=>{
    const y=barTop+(barBot-barTop)*g.y;
    // Tacca
    ctx.beginPath();ctx.moveTo(barX,y);ctx.lineTo(barX-6,y);
    ctx.strokeStyle=g.col;ctx.lineWidth=1.5;ctx.stroke();
    const hi=selPG===g.id;
    if(hi){ctx.beginPath();ctx.arc(barX-10,y,5,0,2*Math.PI);ctx.fillStyle=g.col;ctx.fill();}
    lbl(g.n,barX+barW+8,y-1,hi?g.col:'rgba(220,224,240,0.8)','bold 10px Crimson Pro','left');
    lbl(g.d,barX+barW+8,y+12,'rgba(138,142,154,0.7)','9px Space Mono','left');
  });

  // --- Matrice rocce/composizione ---
  const rocceArr=['Agglomerato','Breccia piroclastica','Tufo lapillistico','Tufo','Ignimbrite','Surge','Lahar'];
  const compArr=['Basaltica','Andesitica','Dacitica/Riolitica'];
  const compCols=['#00aacc','#a8ff78','#c080ff'];

  // Header composizione
  const cellH=(gH*0.85)/(rocceArr.length+1);
  const cellW=matW/compArr.length;
  compArr.forEach((comp,ci)=>{
    const x=matX+ci*cellW+cellW/2;
    const y=pT+cellH*0.5;
    const hi=selPC===comp;
    ctx.fillStyle=compCols[ci];ctx.globalAlpha=hi?0.25:0.08;
    ctx.fillRect(matX+ci*cellW,pT,cellW,gH);ctx.globalAlpha=1;
    lbl(comp,x,y,hi?compCols[ci]:'rgba(200,204,216,0.7)','bold 10px Crimson Pro');
  });

  // Righe rocce
  const granulo_row={
    'Agglomerato':0,'Breccia piroclastica':0.5,
    'Tufo lapillistico':1,'Tufo':2.5,'Ignimbrite':2,'Surge':2,'Lahar':1.5
  };
  const compati={
    'Agglomerato':['Basaltica','Andesitica'],
    'Breccia piroclastica':['Basaltica','Andesitica','Dacitica/Riolitica'],
    'Tufo lapillistico':['Basaltica','Andesitica','Dacitica/Riolitica'],
    'Tufo':['Andesitica','Dacitica/Riolitica'],
    'Ignimbrite':['Dacitica/Riolitica'],
    'Surge':['Basaltica','Andesitica','Dacitica/Riolitica'],
    'Lahar':['Basaltica','Andesitica','Dacitica/Riolitica'],
  };
  const rocceCols={
    'Agglomerato':'#6a3a1a','Breccia piroclastica':'#7a4a2a',
    'Tufo lapillistico':'#5a5a2a','Tufo':'#4a6a3a',
    'Ignimbrite':'#6a4a4a','Surge':'#3a5a4a','Lahar':'#5a4a3a'
  };

  rocceArr.forEach((roccia,ri)=>{
    const y=pT+cellH*(ri+1.5);
    const hi=selPR===roccia;
    // Nome roccia (a sinistra della matrice)
    lbl(roccia,matX-8,y+4,hi?rocceCols[roccia]:'rgba(220,224,240,0.8)','bold 10px Crimson Pro','right');
    // Celle compatibili
    compArr.forEach((comp,ci)=>{
      const x=matX+ci*cellW+cellW/2;
      const compat=compati[roccia]?.includes(comp);
      if(compat){
        const hilite=hi||(selPC===comp);
        ctx.beginPath();ctx.roundRect(matX+ci*cellW+4,y-cellH*0.35,cellW-8,cellH*0.7,4);
        ctx.fillStyle=rocceCols[roccia];ctx.globalAlpha=hilite?0.7:0.3;ctx.fill();ctx.globalAlpha=1;
        ctx.strokeStyle=hilite?compCols[ci]:'rgba(200,204,216,0.2)';ctx.lineWidth=hilite?1.5:0.5;ctx.stroke();
        lbl('✓',x,y+5,hilite?'#fff':'rgba(200,204,216,0.5)','bold 11px Space Mono');
      }
    });
  });

  // Info box se selezione attiva
  const piro_data=ROCCE_PIRO;
  const comp_data=COMPOS_PIRO;
  const gran_data=GRANULO;
  if(selPR&&piro_data[selPR]){
    const r=piro_data[selPR];
    showInfo(`<b>${r.n}</b><br>
      <b>Clasti:</b> ${r.clasti}<br>
      <b>Forma:</b> <span class="acc">${r.forma}</span><br>
      <b>Origine:</b> ${r.orig}<br>
      <b>Esempi:</b> <span class="val">${r.esempi}</span><br><br>
      <span style="font-style:italic;font-size:.6rem">${r.note}</span>`);
  } else if(selPC&&comp_data[selPC]){
    const r=comp_data[selPC];
    showInfo(`<b>${r.n}</b><br>
      <b>SiO₂:</b> <span class="val">${r.SiO2}</span><br>
      <b>Tipo eruttivo:</b> <span class="acc">${r.tipo}</span><br>
      <b>Prodotti:</b> ${r.prodotti}<br>
      <b>Viscosità:</b> <span class="val">${r.viscosita}</span><br>
      <b>Gas:</b> ${r.gas}<br><br>
      <span style="font-style:italic;font-size:.6rem">${r.note}</span>`);
  } else if(selPG&&gran_data[selPG]){
    const g=gran_data[selPG];
    showInfo(`<b>${g.n}</b> &nbsp; <span class="val">${g.d}</span><br><br>
      ${g.desc}<br><br>
      <b>Esempi:</b> <span class="acc">${g.esempi}</span>`);
  }
}

// =====================================================================
// DRAW ROCCE SPECIALI
// =====================================================================
let selSP=null;

function drawSpeciali(){
  const W=C.width,H=C.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#07090e';ctx.fillRect(0,0,W,H);

  // Diagramma K2O vs SiO2 per posizionare le rocce speciali
  const pL=62,pR=20,pT=30,pB=52;
  const gW=W-pL-pR,gH=H-pT-pB;
  const Sm=20,SM=65,Km=0,KM=16;
  const tx=s=>pL+(s-Sm)/(SM-Sm)*gW;
  const ty=k=>pT+gH-(k-Km)/(KM-Km)*gH;

  // Griglia
  ctx.strokeStyle='rgba(30,34,48,0.7)';ctx.lineWidth=0.5;
  ctx.font='10px Space Mono';ctx.fillStyle='#8a8e9a';
  for(let s=20;s<=65;s+=5){
    ctx.beginPath();ctx.moveTo(tx(s),pT);ctx.lineTo(tx(s),pT+gH);ctx.stroke();
    ctx.textAlign='center';ctx.fillText(s,tx(s),pT+gH+18);
  }
  for(let k=0;k<=16;k+=2){
    ctx.beginPath();ctx.moveTo(pL,ty(k));ctx.lineTo(pL+gW,ty(k));ctx.stroke();
    ctx.textAlign='right';ctx.fillText(k,pL-6,ty(k)+4);
  }
  ctx.strokeStyle='rgba(200,204,216,0.6)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pL,pT);ctx.lineTo(pL,pT+gH);ctx.lineTo(pL+gW,pT+gH);ctx.stroke();
  ctx.font='italic 12px Crimson Pro';ctx.fillStyle='#c8ccd8';ctx.textAlign='center';
  ctx.fillText('SiO₂ (%)',pL+gW/2,pT+gH+42);
  ctx.save();ctx.translate(16,pT+gH/2);ctx.rotate(-Math.PI/2);ctx.fillText('K₂O (%)',0,0);ctx.restore();

  // Posizioni nel diagramma K2O-SiO2
  const pos={
    Kimberlite:  {s:30,k:1.8,  ellW:8, ellH:2.5},
    Lamproite:   {s:50,k:7.0,  ellW:6, ellH:3.5},
    Carbonatite: {s:5, k:0.5,  ellW:4, ellH:1.5},  // fuori range, mostriamo a bordo
    Komatiite:   {s:41,k:0.15, ellW:5, ellH:0.8},
    Fonolite:    {s:55,k:5.0,  ellW:5, ellH:3.0},
    Leucitite:   {s:48,k:9.0,  ellW:5, ellH:3.5},
  };
  // Campi normali (MORB/calcalcalina) come riferimento sbiadito
  ctx.fillStyle='rgba(0,212,255,0.04)';
  ctx.fillRect(tx(44),ty(2),tx(58)-tx(44),ty(0)-ty(2));
  lbl('Serie sub-alcaline\n(riferimento)',pL+gW*0.3,ty(0.8),'rgba(0,212,255,0.25)','italic 9px Crimson Pro');

  // Disegna ellissi per le rocce speciali
  Object.entries(SPECIALI).forEach(([k,r])=>{
    const p=pos[k];if(!p)return;
    const x=tx(p.s),y=ty(p.s>SM?p.k:p.k);
    const ex=Math.max(tx(p.s+p.ellW/2)-tx(p.s-p.ellW/2),20);
    const ey=Math.max(ty(p.k-p.ellH/2)-ty(p.k+p.ellH/2),12);
    const hi=selSP===k;
    ctx.beginPath();ctx.ellipse(tx(p.s),ty(p.k),ex/2,ey/2,0,0,2*Math.PI);
    ctx.fillStyle=r.col;ctx.globalAlpha=hi?0.5:0.2;ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle=r.col;ctx.lineWidth=hi?2:1;ctx.stroke();
    lbl(r.n,tx(p.s),ty(p.k)-ey/2-6,hi?'#fff':r.col,'bold 10px Crimson Pro');
  });

  // Info
  if(selSP&&SPECIALI[selSP]){
    const r=SPECIALI[selSP];
    const extra=r.MgO?`<b>MgO:</b> <span class="val">${r.MgO}</span> &nbsp; `:'';
    const extra2=r.Ni?`<b>Ni:</b> <span class="val">${r.Ni}</span><br>`:'';
    const extra3=r['Na2O+K2O']?`<b>Na₂O+K₂O:</b> <span class="val">${r['Na2O+K2O']}</span><br>`:'';
    showInfo(`<b>${r.n}</b><br>
      <b>SiO₂:</b> <span class="val">${r.SiO2}</span> &nbsp; ${extra}<br>
      ${extra2}${extra3}
      <b>Minerali:</b> <span class="acc">${r.min.substring(0,80)}…</span><br>
      <b>Profondità:</b> <span class="val">${r.prof}</span><br>
      <b>Esempi:</b> ${r.esempi.substring(0,60)}<br><br>
      <span style="font-style:italic;font-size:.6rem">${r.note.substring(0,200)}…</span>`);
  }
}

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{

    qapf:'Streckeisen QAPF — classificazione IUGS delle rocce magmatiche (Le Maitre 2002)',

}));
